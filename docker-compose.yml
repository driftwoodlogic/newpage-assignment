services:
  db:
    image: pgvector/pgvector:pg16-bookworm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_eval
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"  # UI + OTLP HTTP
      - "4317:4317"  # OTLP gRPC

volumes:
  pgdata:
